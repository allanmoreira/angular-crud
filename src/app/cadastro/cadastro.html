<div fxLayout="row" fxLayoutAlign="center" style="padding-top: 10px">
    <div fxLayout="column" fxFlex="1000px">
        <form class="mt-60" #clientsFrm="ngForm">
            <mat-card>
                <mat-card-header>
                    <mat-card-title>Formulário de Cadastro</mat-card-title>
                </mat-card-header>
                <mat-card-content class="mt-20">
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <mat-form-field class="full-width">
                            <mat-label>Nome</mat-label>
                            <input matInput name="name" ngModel required>
                        </mat-form-field>
                    </div>

                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <mat-form-field class="full-width">
                            <mat-label>Email</mat-label>
                            <input matInput name="name" ngModel required>
                        </mat-form-field>
                    </div>

                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <mat-form-field class="full-width">
                            <mat-label>CPF</mat-label>
                            <input matInput name="name" ngModel required>
                        </mat-form-field>
                    </div>

                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <mat-form-field class="full-width">
                            <mat-label>Data de Nascimento</mat-label>
                            <input matInput name="name" ngModel required>
                        </mat-form-field>
                    </div>
                </mat-card-content>

                <mat-card-actions>
                    <button mat-flat-button color="primary" [disabled]="clientsFrm.invalid">
                        <mat-icon fontIcon="save"></mat-icon>
                        Salvar
                    </button>
                    <button mat-flat-button color="neutral" class="ml-5">
                        <mat-icon fontIcon="refresh"></mat-icon>
                        Atualizar
                    </button>
                    <button mat-flat-button color="accent" class="ml-5">
                        <mat-icon fontIcon="backspace"></mat-icon>
                        Voltar
                    </button>
                </mat-card-actions>
            </mat-card>
        </form>
    </div>
</div>
